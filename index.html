<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>FinPro</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="app">
        <header>
            <button id="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
            <h1>FinPro</h1>
            <div class="user"><i class="fas fa-user-circle"></i></div>
        </header>

        <nav id="sidebar">
            <ul>
                <li class="active"><i class="fas fa-th-large"></i> Dashboard</li>
                <li><i class="fas fa-sliders-h"></i> Settings</li>
                <li class="logout"><i class="fas fa-sign-out-alt"></i> Logout</li>
            </ul>
        </nav>

        <main>
            <section class="card currency">
                <h2><i class="fas fa-wallet"></i> Currency Tracker</h2>
                <div class="balance" id="balance">$0.00</div>
                <div class="currencies">
                    <button class="active">USD</button>
                    <button>EUR</button>
                    <button>RUB</button>
                    <button>UAH</button>
                </div>
                <input type="number" id="amount" placeholder="Enter amount..." />
                <input type="text" id="note" placeholder="Note (optional)" />
                <div class="actions">
                    <button class="income"><i class="fas fa-arrow-up"></i> Income</button>
                    <button class="undo"><i class="fas fa-undo"></i> Undo</button>
                </div>
                <div class="actions">
                    <button class="reset"><i class="fas fa-trash"></i> Reset</button>
                    <button class="export"><i class="fas fa-file-csv"></i> CSV</button>
                </div>
                <div class="categories">
                    <button><i class="fas fa-utensils"></i> Food</button>
                    <button><i class="fas fa-tshirt"></i> Clothes</button>
                    <button><i class="fas fa-film"></i> Entertain.</button>
                    <button><i class="fas fa-calendar"></i> Monthly</button>
                    <button><i class="fas fa-wallet"></i> Pocket</button>
                    <button><i class="fas fa-piggy-bank"></i> Savings</button>
                </div>
            </section>

            <section class="card status">
                <h2><i class="fas fa-chart-pie"></i> Current Status</h2>
                <ul id="status-list"></ul>
            </section>

            <section class="card goals">
                <h2><i class="fas fa-bullseye"></i> Saving Goals</h2>
                <ul id="goals-list"></ul>
                <div class="goal-input">
                    <input type="text" id="goal-name" placeholder="Goal name" />
                    <input type="number" id="goal-target" placeholder="Target" />
                    <button id="add-goal"><i class="fas fa-plus"></i></button>
                </div>
            </section>

            <section class="card transactions">
                <h2><i class="fas fa-list-ul"></i> Last Transactions</h2>
                <div class="filters">
                    <select id="filter-cat"><option value="all">All cats</option></select>
                    <select id="filter-time"><option value="all">All time</option></select>
                </div>
                <ul id="tx-list"></ul>
            </section>

            <section class="card chart">
                <h2><i class="fas fa-chart-doughnut"></i> Spending Analysis</h2>
                <div class="chart-container">
                    <canvas id="myChart"></canvas>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>

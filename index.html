<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>FinPro — Finance Tracker</title>
  <link rel="stylesheet" href="style.css?v=2" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- ═══ AUTH ═══ -->
  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-logo"><i class="fas fa-coins"></i></div>
      <h2>FinPro</h2>
      <p class="auth-subtitle">Welcome back. Sign in to your account.</p>
      <input type="text" id="username" placeholder="Username" value="admin" />
      <input type="password" id="password" placeholder="Password" value="admin" />
      <button class="btn-primary" onclick="login()"><i class="fas fa-sign-in-alt"></i> Sign In</button>
    </div>
  </div>

  <!-- ═══ APP ═══ -->
  <div id="app-screen" class="hidden">
    <button class="hamburger" onclick="toggleMobileMenu()" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <aside class="sidebar" id="sidebar">
      <div class="brand"><i class="fas fa-coins"></i> FinPro</div>
      <nav class="menu">
        <button class="menu-btn active" data-tab="dashboard" onclick="switchTab('dashboard', this)">
          <i class="fas fa-th-large"></i> Dashboard
        </button>
        <button class="menu-btn" data-tab="settings" onclick="switchTab('settings', this)">
          <i class="fas fa-sliders-h"></i> Settings
        </button>
        <button class="menu-btn logout-btn" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </nav>
    </aside>
    <main class="main-content">
      <div id="tab-dashboard" class="tab-content">
        <div class="dashboard-grid">
          <!-- Currency Panel -->
          <div class="panel panel-currency" style="padding-top: 70px !important;">
            <div class="panel-header"><h3><i class="fas fa-wallet"></i> Currency Tracker</h3></div>
            <div class="balance-display" id="balance-display">$0.00</div>
            <div class="currency-group">
              <button class="currency-btn active" data-curr="USD" onclick="setCurrency('USD')">USD</button>
              <button class="currency-btn" data-curr="EUR" onclick="setCurrency('EUR')">EUR</button>
              <button class="currency-btn" data-curr="RUB" onclick="setCurrency('RUB')">RUB</button>
              <button class="currency-btn" data-curr="UAH" onclick="setCurrency('UAH')">UAH</button>
            </div>
            <div class="input-group">
              <input type="number" id="amount-input" placeholder="Enter amount…" step="0.01" min="0" />
              <input type="text" id="note-input" placeholder="Note (optional)" maxlength="60" />
            </div>
            <div class="actions-main">
              <button class="btn-income" onclick="addTransaction(true)"><i class="fas fa-arrow-up"></i> Income</button>
              <button class="btn-undo" onclick="undo()"><i class="fas fa-undo-alt"></i> Undo</button>
            </div>
            <div class="actions-secondary">
              <button class="btn-reset" onclick="resetAll()"><i class="fas fa-trash-alt"></i> Reset</button>
              <button class="btn-export" onclick="exportCSV()"><i class="fas fa-file-csv"></i> CSV</button>
            </div>
            <div class="cat-grid">
              <button onclick="addTransaction(false, 'Food')"><i class="fas fa-utensils"></i> Food</button>
              <button onclick="addTransaction(false, 'Clothes')"><i class="fas fa-tshirt"></i> Clothes</button>
              <button onclick="addTransaction(false, 'Entertainment')"><i class="fas fa-film"></i> Entertain.</button>
              <button onclick="addTransaction(false, 'Monthly')"><i class="fas fa-calendar-alt"></i> Monthly</button>
              <button onclick="addTransaction(false, 'Pocket')"><i class="fas fa-wallet"></i> Pocket</button>
              <button onclick="addTransaction(false, 'Savings')"><i class="fas fa-piggy-bank"></i> Savings</button>
            </div>
          </div>

          <!-- Status Panel -->
          <div class="panel panel-status">
            <div class="panel-header"><h3><i class="fas fa-chart-pie"></i> Current Status</h3></div>
            <ul class="status-list" id="status-sums"></ul>
          </div>

          <!-- Goals Panel -->
          <div class="panel panel-goals">
            <div class="panel-header"><h3><i class="fas fa-bullseye"></i> Saving Goals</h3></div>
            <ul class="goals-list" id="goals-list"></ul>
            <div class="goal-input-area">
              <input type="text" id="goal-name" placeholder="Goal name" />
              <input type="number" id="goal-target" placeholder="Target" step="0.01" min="0" />
              <button class="btn-add" onclick="addGoal()"><i class="fas fa-plus"></i></button>
            </div>
          </div>

          <!-- Transactions Panel -->
          <div class="panel panel-transactions">
            <div class="panel-header">
              <h3><i class="fas fa-list-ul"></i> Last Transactions</h3>
              <div class="filter-group">
                <select id="filter-category" onchange="applyFilters()">
                  <option value="all">All cats</option>
                  <option value="Income">Income</option>
                  <option value="Food">Food</option>
                  <option value="Clothes">Clothes</option>
                  <option value="Entertainment">Entertainment</option>
                  <option value="Monthly">Monthly</option>
                  <option value="Pocket">Pocket</option>
                  <option value="Savings">Savings</option>
                </select>
                <select id="filter-period" onchange="applyFilters()">
                  <option value="all">All time</option>
                  <option value="today">Today</option>
                  <option value="week">This week</option>
                  <option value="month">This month</option>
                </select>
              </div>
            </div>
            <ul class="tx-list" id="transactions-list"></ul>
          </div>

          <!-- Chart Panel -->
          <div class="panel panel-chart" style="min-height: 220px !important; max-height: 320px !important; padding-bottom: 10px !important;">
            <div class="panel-header"><h3><i class="fas fa-chart-doughnut"></i> Spending Analysis</h3></div>
            <div class="chart-wrap">
              <canvas id="myChart" style="max-height: 200px !important; height: auto !important; width: 100% !important;"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- SETTINGS -->
      <div id="tab-settings" class="tab-content hidden">
        <div class="settings-panel">
          <div class="panel-header"><h3><i class="fas fa-cog"></i> Settings</h3></div>
          <div class="setting-group">
            <label><i class="fas fa-moon"></i> Dark Theme</label>
            <button class="btn-secondary" onclick="toggleTheme()">Toggle</button>
          </div>
          <hr />
          <div class="setting-group">
            <label><i class="fas fa-coins"></i> Category Budgets</label>
            <div id="budget-inputs" class="budget-grid"></div>
            <button class="btn-primary" onclick="saveBudgets()" style="width:auto;padding:10px 24px;">
              <i class="fas fa-save"></i> Save Budgets
            </button>
          </div>
          <hr />
          <div class="setting-group">
            <label><i class="fas fa-database"></i> Backup (JSON)</label>
            <div class="backup-actions">
              <button class="btn-export" onclick="exportJSON()"><i class="fas fa-download"></i> Export</button>
              <label class="btn-import">
                <i class="fas fa-upload"></i> Import
                <input type="file" id="import-file" accept=".json" onchange="importJSON(event)" />
              </label>
            </div>
          </div>
          <hr />
          <div class="setting-group">
            <label><i class="fas fa-user-edit"></i> Profile</label>
            <input type="text" id="new-username" placeholder="New username" />
            <input type="password" id="new-password" placeholder="New password" />
            <button class="btn-primary" onclick="saveSettings()"><i class="fas fa-check"></i> Save Changes</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- ═══ EDIT MODAL ═══ -->
  <div class="modal-overlay hidden" id="edit-modal">
    <div class="modal">
      <h3><i class="fas fa-pen"></i> Edit Transaction</h3>
      <input type="number" id="edit-amount" step="0.01" min="0" placeholder="Amount" />
      <select id="edit-category">
        <option value="Income">Income</option>
        <option value="Food">Food</option>
        <option value="Clothes">Clothes</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Monthly">Monthly</option>
        <option value="Pocket">Pocket</option>
        <option value="Savings">Savings</option>
      </select>
      <input type="text" id="edit-note" placeholder="Note" maxlength="60" />
      <input type="date" id="edit-date" />
      <div class="modal-actions">
        <button class="btn-primary" onclick="saveEdit()"><i class="fas fa-save"></i> Save</button>
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="script.js?v=2"></script>
</body>
</html>
